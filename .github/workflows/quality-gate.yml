name: Quality Gate
on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version"
        required: false
        type: string
        default: "10.x"
      restore-project:
        description: "Specific .csproj to restore (empty for full solution)"
        required: false
        type: string
        default: ""
      qodana-fail-threshold:
        description: "Qodana failure threshold (0 = fail on any violation)"
        required: false
        type: string
        default: "0"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 20
      enable-format:
        description: "Enable dotnet format auto-fix (caller must grant contents: write)"
        required: false
        type: boolean
        default: false
      solution-file:
        description: "Solution file for dotnet format (e.g. MyApp.sln). Required when enable-format is true."
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner label for the quality job"
        required: false
        type: string
        default: "ubuntu-latest"

permissions: {}

jobs:
  quality:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.enable-format && github.head_ref || '' }}
          fetch-depth: ${{ github.event.pull_request.commits }}

      - name: Setup dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore packages
        env:
          NUGET_PAT: ${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}
          NUGET_USERNAME: ${{ vars.NUGET_USERNAME }}
          NUGET_SOURCE_URL: ${{ vars.NUGET_SOURCE_URL }}
          RESTORE_PROJECT: ${{ inputs.restore-project }}
        run: |
          dotnet nuget add source --username "$NUGET_USERNAME" --password "$NUGET_PAT" --store-password-in-clear-text --name github "$NUGET_SOURCE_URL"
          dotnet restore $RESTORE_PROJECT
          dotnet nuget remove source github

      - name: Run dotnet format
        if: ${{ inputs.enable-format }}
        run: dotnet format ${{ inputs.solution-file }} --no-restore --severity warn

      - name: Commit formatting changes
        if: ${{ inputs.enable-format }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes needed."
          else
            git commit -m "Apply dotnet format"
            git push
          fi

      - name: Verify no remaining format violations
        if: ${{ inputs.enable-format }}
        run: dotnet format ${{ inputs.solution-file }} --no-restore --severity warn --verify-no-changes

      - name: Qodana Scan
        id: qodana
        continue-on-error: true
        uses: JetBrains/qodana-action@89eb4357efd2b52e639f3216e63edaf33b82622b # v2025.3.2
        with:
          pr-mode: false
          args: --fail-threshold=${{ inputs.qodana-fail-threshold }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Extract Qodana violations
        if: always() && steps.qodana.outcome == 'failure'
        env:
          SARIF_PATH: ${{ runner.temp }}/qodana/results/qodana.sarif.json
        run: |
          if [ -f "$SARIF_PATH" ]; then
            jq '[.runs[].results[] | {ruleId, level, message: .message.text, file: .locations[0].physicalLocation.artifactLocation.uri, line: .locations[0].physicalLocation.region.startLine}]' "$SARIF_PATH" > qodana-violations.json
            echo "### Qodana violations" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.[] | "- **\(.ruleId)** (\(.level)) \(.file):\(.line) — \(.message)"' qodana-violations.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::SARIF file not found at $SARIF_PATH"
          fi

      - name: Upload Qodana SARIF
        if: always() && steps.qodana.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: qodana-sarif
          path: |
            ${{ runner.temp }}/qodana/results/qodana.sarif.json
            qodana-violations.json
          retention-days: 7

      - name: Fail on Qodana violations
        if: always() && steps.qodana.outcome == 'failure'
        run: exit 1
