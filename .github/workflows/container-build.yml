name: Container Build
on:
  workflow_call:
    inputs:
      product-name:
        description: "Root product name for the container"
        required: true
        type: string
      container-name:
        description: "Container registry path segment"
        required: true
        type: string
      project-folder:
        description: "Directory containing the Dockerfile"
        required: true
        type: string
      octopus-project:
        description: "Octopus Deploy project name"
        required: true
        type: string
      environment:
        description: "UAT environment to deploy to (from workflow_dispatch)"
        required: false
        type: string
        default: ""
      action:
        description: "Deploy action (Deploy or Build)"
        required: false
        type: string
        default: ""
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30
      docker-cache:
        description: "Enable Docker layer caching via GHA"
        required: false
        type: boolean
        default: true
      docker-cache-mode:
        description: "Cache export mode: min (final layers only) or max (all layers including intermediate stages)"
        required: false
        type: string
        default: "min"
      runs-on:
        description: "Runner label for the build job"
        required: false
        type: string
        default: "ubuntu-latest"

permissions: {}

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: standard
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Docker Builder (Blacksmith)
        if: contains(runner.name, 'blacksmith')
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1.9.0

      - name: Setup Docker Buildx
        if: ${{ !contains(runner.name, 'blacksmith') }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_GITHUB_ACTION }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_MINITER }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
          allow-no-subscriptions: true

      - name: Login to ACR via OIDC
        run: az acr login --name "$ACR_NAME"
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}

      - name: Calculate version
        id: version
        uses: waynebrantley/github-dateversion@20c0ad5daab3d88585f496fd75fba9578841fa31 # v1.5

      - name: Build container image (Blacksmith)
        if: contains(runner.name, 'blacksmith')
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2.2.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          push: false
          load: true
          tags: |
            ${{ vars.MINITER_CONTAINER_REGISTRY_PATH }}/${{ inputs.container-name }}:${{ steps.version.outputs.version }}
            ${{ github.ref == 'refs/heads/master' && format('{0}/{1}:latest', vars.MINITER_CONTAINER_REGISTRY_PATH, inputs.container-name) || '' }}
          file: "${{ inputs.project-folder }}/Dockerfile"
          cache-from: ${{ inputs.docker-cache && 'type=gha' || '' }}
          cache-to: ${{ inputs.docker-cache && github.ref == 'refs/heads/master' && format('type=gha,mode={0}', inputs.docker-cache-mode) || '' }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            PRODUCT_NAME=${{ inputs.product-name }}
            IS_MASTER=${{ github.ref == 'refs/heads/master' }}
          secrets: |
            MINITER_PACKAGES_PAT=${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}
            nuget_pat=${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}

      - name: Build container image
        if: ${{ !contains(runner.name, 'blacksmith') }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          push: false
          load: true
          tags: |
            ${{ vars.MINITER_CONTAINER_REGISTRY_PATH }}/${{ inputs.container-name }}:${{ steps.version.outputs.version }}
            ${{ github.ref == 'refs/heads/master' && format('{0}/{1}:latest', vars.MINITER_CONTAINER_REGISTRY_PATH, inputs.container-name) || '' }}
          file: "${{ inputs.project-folder }}/Dockerfile"
          cache-from: ${{ inputs.docker-cache && 'type=gha' || '' }}
          cache-to: ${{ inputs.docker-cache && github.ref == 'refs/heads/master' && format('type=gha,mode={0}', inputs.docker-cache-mode) || '' }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            PRODUCT_NAME=${{ inputs.product-name }}
            IS_MASTER=${{ github.ref == 'refs/heads/master' }}
          secrets: |
            MINITER_PACKAGES_PAT=${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}
            nuget_pat=${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}

      - name: Push container image to registry
        env:
          REGISTRY_PATH: ${{ vars.MINITER_CONTAINER_REGISTRY_PATH }}
          IMAGE_NAME: ${{ inputs.container-name }}
          IMAGE_VERSION: ${{ steps.version.outputs.version }}
          IS_MASTER: ${{ github.ref == 'refs/heads/master' }}
        run: |
          TAGS=("${REGISTRY_PATH}/${IMAGE_NAME}:${IMAGE_VERSION}")
          if [[ "$IS_MASTER" == "true" ]]; then
            TAGS+=("${REGISTRY_PATH}/${IMAGE_NAME}:latest")
          fi
          for TAG in "${TAGS[@]}"; do
            pushed=false
            for attempt in 1 2 3; do
              if docker push "$TAG"; then
                pushed=true
                break
              fi
              echo "::warning::Push attempt $attempt for $TAG failed, retrying in 10s..."
              sleep 10
            done
            if [[ "$pushed" != "true" ]]; then
              echo "::error::All push attempts failed for $TAG"
              exit 1
            fi
          done

      - name: Create Release Notes
        run: printf '%s\n' "$COMMIT_MSG" > releasenotes.txt
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Push build information to Octopus Deploy
        if: github.ref == 'refs/heads/master'
        uses: OctopusDeploy/push-build-information-action@1f2f8fa57e1db46e6c74ec968f00960b291bed37 # v4.1.3
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          packages: ${{ inputs.container-name }}
          version: ${{ steps.version.outputs.version }}

      - name: Create a release in Production for Octopus Deploy
        uses: OctopusDeploy/create-release-action@41621dd2b319b1dbf1f537913f2d18992eff6fd5 # v4.1.4
        if: github.ref == 'refs/heads/master'
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          project: ${{ inputs.octopus-project }}
          release_number: ${{ steps.version.outputs.version }}
          channel: Production
          release_notes_file: releasenotes.txt

      - name: Create a release in UAT Octopus Deploy
        uses: OctopusDeploy/create-release-action@41621dd2b319b1dbf1f537913f2d18992eff6fd5 # v4.1.4
        if: github.ref != 'refs/heads/master'
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          project: ${{ inputs.octopus-project }}
          release_number: ${{ steps.version.outputs.version }}
          channel: UAT
          release_notes_file: releasenotes.txt

      - name: Deploy to Environment
        if: inputs.environment != '' && inputs.action == 'Deploy'
        uses: OctopusDeploy/deploy-release-action@eb8a56e05384f6741ee318b660ad5ebaffbd2382 # v4.2.2
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          project: ${{ inputs.octopus-project }}
          release_number: ${{ steps.version.outputs.version }}
          environments: UAT
          variables: |
            Environment:${{ inputs.environment }}
