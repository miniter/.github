name: Container Build
on:
  workflow_call:
    inputs:
      product-name:
        description: "Root product name for the container"
        required: true
        type: string
      container-name:
        description: "Container registry path segment"
        required: true
        type: string
      project-folder:
        description: "Directory containing the Dockerfile"
        required: true
        type: string
      octopus-project:
        description: "Octopus Deploy project name"
        required: true
        type: string
      environment:
        description: "UAT environment to deploy to (from workflow_dispatch)"
        required: false
        type: string
        default: ""
      action:
        description: "Deploy action (Deploy or Build)"
        required: false
        type: string
        default: ""
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30
      docker-cache:
        description: "Enable Docker layer caching via GHA"
        required: false
        type: boolean
        default: true
      docker-cache-mode:
        description: "Cache export mode: min (final layers only) or max (all layers including intermediate stages)"
        required: false
        type: string
        default: "min"
      runs-on:
        description: "Runner label for the build job"
        required: false
        type: string
        default: "ubuntu-latest"

permissions: {}

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: standard
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@5241b2e9423e8b1fa37ed6050ecb62d0fb9a4e38 # v1

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_GITHUB_ACTION }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_MINITER }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
          allow-no-subscriptions: true

      - name: Login to ACR via OIDC
        run: az acr login --name "$ACR_NAME"
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}

      - name: Calculate version
        id: version
        uses: waynebrantley/github-dateversion@500a72f15f862e94fa43605145901c858c4a2a45 # v1

      - name: Build container image
        uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          push: false
          load: true
          tags: ${{ vars.MINITER_CONTAINER_REGISTRY_PATH }}/${{ inputs.container-name }}:${{ steps.version.outputs.version }}
          file: "${{ inputs.project-folder }}/Dockerfile"
          cache-from: ${{ inputs.docker-cache && 'type=gha' || '' }}
          cache-to: ${{ inputs.docker-cache && github.ref == 'refs/heads/master' && format('type=gha,mode={0}', inputs.docker-cache-mode) || '' }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            PRODUCT_NAME=${{ inputs.product-name }}
          secrets: |
            MINITER_PACKAGES_PAT=${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}
            nuget_pat=${{ secrets.NUGET_REPOSITORY_READONLY_GITHUB }}

      - name: Push container image to registry
        env:
          REGISTRY_PATH: ${{ vars.MINITER_CONTAINER_REGISTRY_PATH }}
          IMAGE_NAME: ${{ inputs.container-name }}
          IMAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="${REGISTRY_PATH}/${IMAGE_NAME}:${IMAGE_VERSION}"
          for attempt in 1 2 3; do
            docker push "$TAG" && exit 0
            echo "::warning::Push attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::All push attempts failed"
          exit 1

      - name: Create Release Notes
        run: printf '%s\n' "$COMMIT_MSG" > releasenotes.txt
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Push build information to Octopus Deploy
        if: github.ref == 'refs/heads/master'
        uses: OctopusDeploy/push-build-information-action@13dace5eb38d7d5dc639a8bddc83829fb95d04e4 # v4
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          packages: ${{ inputs.container-name }}
          version: ${{ steps.version.outputs.version }}

      - name: Create a release in Production for Octopus Deploy
        uses: OctopusDeploy/create-release-action@f05ba34acdbaf5a8be40831285a4051b2b595ff2 # v4
        if: github.ref == 'refs/heads/master'
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          project: ${{ inputs.octopus-project }}
          release_number: ${{ steps.version.outputs.version }}
          channel: Production
          release_notes_file: releasenotes.txt

      - name: Create a release in UAT Octopus Deploy
        uses: OctopusDeploy/create-release-action@f05ba34acdbaf5a8be40831285a4051b2b595ff2 # v4
        if: github.ref != 'refs/heads/master'
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          project: ${{ inputs.octopus-project }}
          release_number: ${{ steps.version.outputs.version }}
          channel: UAT
          release_notes_file: releasenotes.txt

      - name: Deploy to Environment
        if: inputs.environment != '' && inputs.action == 'Deploy'
        uses: OctopusDeploy/deploy-release-action@f23325841e564d05b3919dbdd27c2a2569a56e88 # v4
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: Default
        with:
          project: ${{ inputs.octopus-project }}
          release_number: ${{ steps.version.outputs.version }}
          environments: UAT
          variables: |
            Environment:${{ inputs.environment }}
